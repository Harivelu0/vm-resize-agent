AWSTemplateFormatVersion: '2010-09-09'
Description: VM Auto-Resize Agent - Pipeline Complete Trigger

Parameters:
  AlertEmail:
    Type: String
    Description: Email to receive alerts
  TargetInstanceType:
    Type: String
    Default: t3.medium
    Description: Instance type to resize DOWN to after pipeline

Resources:

  # 1. Custom Event Bus
  PipelineEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: vm-resize-agent-bus

  # 2. SNS Topic for alerts
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: vm-resize-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # 3. Lambda IAM Role
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: vm-resize-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: vm-resize-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:ModifyInstanceAttribute
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - sns:Publish
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # 4. Lambda Function
  ResizeAgentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vm-resize-agent
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref AlertTopic
          TARGET_INSTANCE_TYPE: !Ref TargetInstanceType
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          SNS_TOPIC_ARN        = os.environ["SNS_TOPIC_ARN"]
          TARGET_INSTANCE_TYPE = os.environ["TARGET_INSTANCE_TYPE"]
          REGION               = os.environ.get("AWS_REGION", "us-east-1")

          ec2 = boto3.client("ec2", region_name=REGION)
          sns = boto3.client("sns", region_name=REGION)

          def get_instance_id():
              response = ec2.describe_instances(
                  Filters=[
                      {"Name": "tag:Name",            "Values": ["vm-resize-agent-demo"]},
                      {"Name": "instance-state-name", "Values": ["running", "stopped"]}
                  ]
              )
              reservations = response.get("Reservations", [])
              if not reservations:
                  return None
              return reservations[0]["Instances"][0]["InstanceId"]

          def resize_instance(instance_id, target_type):
              ec2.stop_instances(InstanceIds=[instance_id])
              waiter = ec2.get_waiter("instance_stopped")
              waiter.wait(InstanceIds=[instance_id])
              ec2.modify_instance_attribute(
                  InstanceId=instance_id,
                  Attribute="instanceType",
                  Value=target_type
              )
              ec2.start_instances(InstanceIds=[instance_id])
              return True

          def send_alert(detail, instance_id, resized):
              status        = detail.get("status", "UNKNOWN")
              pipeline      = detail.get("pipeline", "data-loader")
              steps         = f"{detail.get('steps_completed')}/{detail.get('steps_total')}"
              duration_secs = detail.get("duration_minutes", 0)
              duration_str  = f"{duration_secs}s" if duration_secs < 120 else f"{duration_secs // 60}m {duration_secs % 60}s"
              failed        = detail.get("failed_step", "N/A")

              if status == "SUCCESS":
                  subject = f"[{pipeline}] Pipeline completed successfully"
                  message = (
                      f"Pipeline: {pipeline}\n"
                      f"Status:   SUCCESS\n"
                      f"Steps:    {steps}\n"
                      f"Duration: {duration_str}\n"
                      f"Instance: {instance_id}\n"
                      f"Resized:  {'Yes -> ' + TARGET_INSTANCE_TYPE if resized else 'No'}\n"
                  )
              else:
                  subject = f"[{pipeline}] Pipeline FAILED"
                  message = (
                      f"Pipeline:  {pipeline}\n"
                      f"Status:    FAILURE\n"
                      f"Steps:     {steps}\n"
                      f"Duration:  {duration_str}\n"
                      f"Failed at: {failed}\n"
                      f"Instance:  {instance_id}\n"
                      f"Resized:   No (kept original size for debugging)\n"
                  )

              sns.publish(
                  TopicArn=SNS_TOPIC_ARN,
                  Subject=subject,
                  Message=message
              )

          def lambda_handler(event, context):
              print("Event received:", json.dumps(event))
              detail      = event.get("detail", {})
              status      = detail.get("status", "UNKNOWN")
              instance_id = get_instance_id()

              if not instance_id:
                  print("[WARN] No EC2 instance found with tag vm-resize-agent-demo")
                  send_alert(detail, "N/A", False)
                  return {"status": "no-instance-found"}

              resized = False
              if status == "SUCCESS":
                  print(f"[INFO] Resizing {instance_id} -> {TARGET_INSTANCE_TYPE}")
                  resize_instance(instance_id, TARGET_INSTANCE_TYPE)
                  resized = True
              else:
                  print(f"[INFO] Pipeline failed - keeping VM size for debugging")

              send_alert(detail, instance_id, resized)
              return {"status": "done", "resized": resized}

  # 5. CloudWatch Log Group
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/vm-resize-agent
      RetentionInDays: 30

  # 6. EventBridge Rule
  PipelineCompleteRule:
    Type: AWS::Events::Rule
    Properties:
      Name: pipeline-complete-trigger
      EventBusName: !Ref PipelineEventBus
      EventPattern:
        source:
          - vm.pipeline
        detail-type:
          - PipelineComplete
      State: ENABLED
      Targets:
        - Arn: !GetAtt ResizeAgentLambda.Arn
          Id: ResizeAgentTarget

  # 7. Lambda permission for EventBridge
  LambdaEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResizeAgentLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PipelineCompleteRule.Arn

  # 8. SSM Parameter (target size config)
  TargetSizeParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /vm-resize-agent/target-instance-type
      Type: String
      Value: !Ref TargetInstanceType

Outputs:
  EventBusArn:
    Value: !GetAtt PipelineEventBus.Arn
    Description: Use this in emit_event.py

  SNSTopicArn:
    Value: !Ref AlertTopic
    Description: SNS  for alerts

  LambdaArn:
    Value: !GetAtt ResizeAgentLambda.Arn
    Description: Lambda function ARN